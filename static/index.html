<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Health is Heaven Hospital Chatbot</title>
  <link rel="stylesheet" href="/static/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600&display=swap" rel="stylesheet" />
</head>
<body>
  <div class="chat-container">
    <div class="header">🏥 Health is Heaven Hospital Chatbot</div>

    <div id="chat-box">
      <div class="msg bot-msg">
        Hello! 👋 Welcome to <strong>Health is Heaven Hospital</strong>. How can I assist you today?
      </div>
    </div>

    <form id="chat-form">
      <input type="text" id="user-input" placeholder="Type your question here..." autocomplete="off" required />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="/static/script.js"></script>
</body>
</html>
